<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Futures Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d0d; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
    #root { width: 100vw; height: 100vh; }
    #loading { display: flex; align-items: center; justify-content: center; height: 100vh; font-size: 14px; color: #888; }
  </style>
</head>
<body>
  <div id="root"><div id="loading">載入中...</div></div>
  <script type="module">
    import { createElement } from "https://esm.sh/react@18";
    import { createRoot } from "https://esm.sh/react-dom@18/client";

    // 載入 Babel standalone
    await new Promise((resolve, reject) => {
      const s = document.createElement("script");
      s.src = "https://unpkg.com/@babel/standalone/babel.min.js";
      s.onload = resolve;
      s.onerror = reject;
      document.head.appendChild(s);
    });

    // 取得 JSX 原始碼並轉換
    const res = await fetch("/static/trading-platform.jsx");
    const src = await res.text();

    const { code } = Babel.transform(src, {
      presets: ["react"],
      filename: "trading-platform.jsx",
    });

    // 將 bare specifier 換成完整 CDN URL（Blob URL 不支援 importmap）
    const resolved = code
      .replace(/from\s+"react"/g, 'from "https://esm.sh/react@18"')
      .replace(/from\s+'react'/g, "from 'https://esm.sh/react@18'");

    const blob = new Blob([resolved], { type: "application/javascript" });
    const url = URL.createObjectURL(blob);
    const mod = await import(url);
    URL.revokeObjectURL(url);

    const App = mod.default;
    const root = createRoot(document.getElementById("root"));
    root.render(createElement(App));
  </script>
</body>
</html>
